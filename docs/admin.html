<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#070b10" />
    <title>谱库后台 · Tang Tang 𝄢</title>
    <link rel="icon" type="image/png" href="/TangTang-score-video/favicon-32.png" />
    <link rel="apple-touch-icon" href="/TangTang-score-video/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Serif+SC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/TangTang-score-video/styles.css" />
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>
    <main class="shell library-shell">
      <header class="library-header">
        <a class="library-back" href="/TangTang-score-video/">← 返回首页</a>
        <p class="brand">Tang Tang <span class="clef" aria-hidden="true">𝄢</span></p>
        <h1>谱库后台</h1>
        <p class="lead library-lead">登录后可下载库内全部 MusicXML。</p>
      </header>

      <form class="admin-login" id="login-form">
        <label>
          管理员密码
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </label>
        <p class="admin-error" id="login-error"></p>
        <button type="submit" class="cta">进入后台</button>
      </form>

      <section class="admin-panel hidden" id="admin-panel">
        <div class="admin-toolbar">
          <p class="library-meta" id="library-meta" style="margin: 0">加载中…</p>
          <button type="button" class="ghost" id="logout">退出登录</button>
        </div>
        <div class="library-list" id="library-list"></div>
      </section>
    </main>
    <script src="/TangTang-score-video/admin.js"></script>
  </body>
</html>
