<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#070b10" />
    <title>琴谱库 · Tang Tang 𝄢</title>
    <link rel="icon" type="image/png" href="/TangTang-score-video/favicon-32.png" />
    <link rel="apple-touch-icon" href="/TangTang-score-video/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Serif+SC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/TangTang-score-video/styles.css" />
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>
    <main class="shell library-shell">
      <header class="library-header">
        <a class="library-back" href="/TangTang-score-video/">← 返回</a>
        <p class="brand">Tang Tang <span class="clef" aria-hidden="true">𝄢</span></p>
        <h1>琴谱库</h1>
        <p class="lead library-lead">
          汇集大家用过的曲目。上传谱面识别成功后会自动入库。
        </p>
      </header>

      <p class="library-meta" id="library-meta">加载中…</p>
      <div class="library-list" id="library-list"></div>

      <section class="progress hidden" id="progress">
        <div class="bar"><i id="bar"></i></div>
        <p id="status">准备中…</p>
      </section>

      <section class="results hidden" id="results">
        <h2 id="piece-title">输出成品</h2>
        <div class="grid">
          <article class="card">
            <h3>唱音阶</h3>
            <video id="v-solfege" controls playsinline></video>
            <a class="dl btn-dl" id="dl-solfege" href="#">下载唱音阶</a>
          </article>
          <article class="card">
            <h3>大提琴 · 指法</h3>
            <video id="v-cello" controls playsinline></video>
            <a class="dl btn-dl" id="dl-cello" href="#">下载大提琴</a>
          </article>
        </div>
        <a class="dl btn-dl wide" id="dl-fingerings" href="#">下载指法表（JSON）</a>
        <button type="button" class="ghost" id="again">继续浏览曲目</button>
      </section>
    </main>
    <script src="/TangTang-score-video/download.js"></script>
    <script src="/TangTang-score-video/library.js"></script>
  </body>
</html>
